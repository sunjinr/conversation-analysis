services:
  - type: web
    name: cco-analysis
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://coding.dashscope.aliyuncs.com/v1
      - key: LLM_CHAT_MODEL
        value: qwen3-coder-plus
